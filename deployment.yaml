apiVersion: apps/v1
kind: Deployment
metadata:
  name: minha-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: minha-api
  template:
    metadata:
      labels:
        app: minha-api
    spec:
      containers:
        - name: minha-api
          image: vitorgsf/devops-python-api:latest
          ports:
            - containerPort: 3000
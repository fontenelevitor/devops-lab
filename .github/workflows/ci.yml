name: CI DevOps Lab

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Testar API (smoke test)
        run: |
          python app.py &
          sleep 3
          curl http://localhost:3000/health

      - name: Build Docker
        run: docker build -t devops-python-api:ci .
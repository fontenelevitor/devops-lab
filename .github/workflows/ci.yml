name: CI DevOps Lab

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Testar API (smoke test)
        run: |
          nohup python app.py > log.txt 2>&1 &
          sleep 5
          curl --fail http://localhost:3000/health

      - name: Login no Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build e Push Docker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-python-api:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-python-api:latest
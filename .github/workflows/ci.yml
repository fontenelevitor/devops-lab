name: CI DevOps Lab

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test
        run: |
          python - << 'EOF'
          import requests, threading, time
          from subprocess import Popen
          p = Popen(["python","app.py"])
          time.sleep(2)
          import urllib.request
          print(urllib.request.urlopen("http://127.0.0.1:3000/health").read())
          p.terminate()
          EOF

      - name: Build Docker image
        run: docker build -t devops-python-api:ci .